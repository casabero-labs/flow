name: Deploy Backend

on:
  push:
    branches: [master]
    paths: ['backend/**']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/flow-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
          default-settings: type=image,visibility=public

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notify Coolify (deployment)
        run: |
          # Buscar la app de flow-backend en Coolify via API interna del server
          # El servidor Coolify está en 192.168.1.7
          # Esto es un placeholder — Coolify redeploya automáticamente
          # si está configurado para watch el registry de ghcr.io
          echo "Backend image pushed: ${{ steps.meta.outputs.tags }}"
          echo "Coolify detectará la nueva imagen y redeployará automáticamente"
