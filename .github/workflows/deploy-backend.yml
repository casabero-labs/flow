name: Deploy Backend

on:
  push:
    branches: [master]
    paths: ['backend/**']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/flow-backend
  COOLIFY_URL: http://192.168.1.7:8000
  COOLIFY_UUID: adt11irwuqprcupbkdgkrjei

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Test step ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install test dependencies
        run: |
          pip install --no-cache-dir -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Run backend tests
        run: |
          cd backend && python -m pytest tests/ -v

      # ── Build & Push ──
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
          default-settings: type=image,visibility=public

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── Coolify Deploy ──
      - name: Notify Coolify
        id: coolify
        env:
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          set -e

          echo "🚀 Triggering Coolify deployment for backend..."
          RESPONSE=$(curl -s -X POST "${{ env.COOLIFY_URL }}/api/v1/deploy?uuid=${{ env.COOLIFY_UUID }}&force=true" \
            -H "Authorization: Bearer $COOLIFY_API_KEY" \
            -H "Content-Type: application/json")

          echo "Response: $RESPONSE"

          # Extract deployment_uuid
          DEPLOYMENT_UUID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deployment_uuid',''))" 2>/dev/null || echo "")

          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "⚠️  No deployment UUID returned — deployment may already be in progress."
            echo "Response: $RESPONSE"
            exit 0
          fi

          echo "Deployment UUID: $DEPLOYMENT_UUID"

          # Poll until finished
          INTERVAL=10
          MAX_RETRIES=60  # 10 min max
          RETRIES=0

          while [ $RETRIES -lt $MAX_RETRIES ]; do
            sleep $INTERVAL

            STATUS_RESPONSE=$(curl -s "${{ env.COOLIFY_URL }}/api/v1/deployments/$DEPLOYMENT_UUID" \
              -H "Authorization: Bearer $COOLIFY_API_KEY")

            STATUS=$(echo "$STATUS_RESPONSE" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    print(d.get('status', d.get('data', {}).get('status', 'unknown')))
except:
    print('error')
" 2>/dev/null)

            echo "Polling ($((RETRIES+1))/$MAX_RETRIES): status=$STATUS"

            case "$STATUS" in
              finished)
                echo "✅ Coolify deployment finished successfully!"
                exit 0
                ;;
              failed|canceled)
                echo "❌ Coolify deployment $STATUS"
                echo "Details: $STATUS_RESPONSE"
                exit 1
                ;;
              *)
                RETRIES=$((RETRIES+1))
                ;;
            esac
          done

          echo "⏰ Timeout waiting for Coolify deployment"
          exit 1
