version: '3.8'

services:
  backend:
    image: ghcr.io/casabero-labs/flow/flow-backend:latest
    container_name: flow-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./flow.db
      - SECRET_KEY=${SECRET_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - flow-data:/app/data

  frontend:
    image: ghcr.io/casabero-labs/flow/flow-frontend:latest
    container_name: flow-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=${BACKEND_URL}
    depends_on:
      - backend

volumes:
  flow-data:
